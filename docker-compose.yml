services:
  db:
    image: postgres:16-alpine
    container_name: aibi-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-biuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bipassword}
      POSTGRES_DB: ${POSTGRES_DB:-aibi}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-biuser}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: aibi-backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      POSTGRES_HOST: db
      POSTGRES_USER: ${POSTGRES_USER:-biuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bipassword}
      POSTGRES_DB: ${POSTGRES_DB:-aibi}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      BACKEND_CORS_ORIGINS: http://localhost:3000
      LLM_API_KEY: ${LLM_API_KEY:-}
    ports:
      - "8000:8000"
    volumes:
      - uploads:/app/uploads

  frontend:
    build: ./frontend
    container_name: aibi-frontend
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"

volumes:
  pgdata:
  uploads:
